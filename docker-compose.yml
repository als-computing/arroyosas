  kvrocks:
    image: docker.io/apache/kvrocks:latest
    volumes:
      - ./conf/kvrocks/kvrocks.conf:/etc/kvrocks/kvrocks.conf
      - ./persist/kvrocks/data:/data
    networks:
      gisax_net1:
    ports:
      - "127.0.0.1:6666:6666"

networks:
  gisax_net1:
    driver: bridge
