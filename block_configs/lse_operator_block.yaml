blocks:
  - name: LSE Operator
    description: 1D reduction operator - listens for raw frames from tiled reduces, publishes to websocket and tiled

    operator:
      class: arrosas.le.build_lse_operator

    listeners:
      - class: arroyosas.tiled.tiled_websocket.create_tiled_websocket_listener
        kwargs:
          uri: "http://tiled:8000"
          stream_name: "primary"
          target: "img"
      # api_key: falls back to TILED_LIVE_API_KEY env var

    publishers:
      - class: arroyosas.websockets.OneDWSPublisher
        kwargs:
          host: "0.0.0.0"
          port: 8020
      - class: arroyosas.tiled.tiled_poller.create_tiled_processed_publisher
        kwargs:
          uri: "http://tiled:8000"
          root_segments:
            - beamlines
            - bl733
          # api_key: falls back to TILED_LIVE_API_KEY env var
