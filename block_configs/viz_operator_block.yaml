blocks:
  - name: viz_operator
    description: 1D reduction operator - listens for raw frames over ZMQ, reduces, publishes to websocket and tiled

    operator:
      class: arroyosas.one_d_reduction.operator.create_one_d_reduction_operator
      kwargs:
        tiled_uri: "https://tiled.nsls2.bnl.gov"
        redis_host: "kvrocks"
        redis_port: 6666
        # tiled_api_key: falls back to TILED_LIVE_API_KEY env var

    listeners:
      - class: arroyosas.zmq.create_zmq_frame_listener
        kwargs:
          zmq_address: "tcp://tiled_poller:5000"

    publishers:
      - class: arroyosas.websockets.OneDWSPublisher
        kwargs:
          host: "0.0.0.0"
          port: 8020
      - class: arroyosas.tiled.tiled_poller.create_tiled_processed_publisher
        kwargs:
          uri: "https://tiled.computing.als.lbl.gov"
          root_segments:
            - beamlines
            - bl733
          # api_key: falls back to TILED_LIVE_API_KEY env var
