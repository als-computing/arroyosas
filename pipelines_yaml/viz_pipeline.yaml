blocks:
  - name: viz_pipeline
    description: 1D reduction visualization pipeline

    operator:
      class: arroyosas.components.VizOperator
      kwargs:
        tiled_uri: https://tiled.nsls2.bnl.gov
        tiled_api_key: !env TILED_LIVE_API_KEY
        redis_host: kvrocks
        redis_port: 6666

    listeners:
      - class: arroyosas.components.VizZMQListener
        kwargs:
          address: tcp://tiled_poller:5000

    publishers:
      - class: arroyosas.components.VizTiledProcessedPublisher
        kwargs:
          tiled_uri: https://tiled.nsls2.bnl.gov
          tiled_api_key: !env TILED_LIVE_API_KEY
          root_segments:
            - smi
            - sandbox
            - viz
            - tmp
      - class: arroyosas.components.VizWSPublisher
        kwargs:
          host: 0.0.0.0
          port: 8020