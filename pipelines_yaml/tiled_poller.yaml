blocks:
  - name: tiled_poller
    description: Tiled polling pipeline

    operator:
      class: arroyosas.tiled.tiled_poller.TiledRawFrameOperator

    listeners:
      - class: arroyosas.components.VizTiledPollingRedisListener
        kwargs:
          tiled_uri: https://tiled.nsls2.bnl.gov
          tiled_api_key: !env TILED_LIVE_API_KEY
          runs_segments:
            - smi
            - raw
          frames_segments:
            - primary
            - data
            - pil1M_image
          redis_host: kvrocks
          redis_port: 6666

    publishers:
      - class: arroyosas.components.VizZMQPublisher
        kwargs:
          address: tcp://0.0.0.0:5000