blocks:
  - name: lse_pipeline
    description: Latent space extraction pipeline

    operator:
      class: arroyosas.components.LSEOperator
      kwargs:
        zmq_broker_router_address: tcp://lse_broker:5555
        zmq_broker_router_hwm: 100000
        ws_host: 0.0.0.0
        ws_port: 8765

    listeners:
      - class: arroyosas.components.VizZMQListener
        kwargs:
          address: tcp://tiled_poller:5000

    publishers:
      - class: arroyosas.components.LSEWSPublisher
        kwargs:
          host: 0.0.0.0
          port: 8765
      - class: arroyosas.components.VizTiledProcessedPublisher
        kwargs:
          tiled_uri: https://tiled.nsls2.bnl.gov
          tiled_api_key: !env TILED_LIVE_API_KEY
          root_segments:
            - smi
            - sandbox
            - viz
            - tmp